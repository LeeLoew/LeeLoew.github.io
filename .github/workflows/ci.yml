name: Build site
# Validation only — deployment happens via GitHub Pages' own branch build
# of master (github-pages gem). This catches broken Liquid/config before merge.
on: [push, pull_request]

jobs:
  build:
    name: Build Jekyll
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Install dependencies
        run: bundle install
      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --strict_front_matter
