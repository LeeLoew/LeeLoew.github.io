# Site configuration — Lee Rogers, leeloew.github.io
# Plain Jekyll site (no theme gem). GitHub Pages builds this directly from
# master with the `github-pages` gem (Jekyll 3.10, safe mode), so only
# whitelisted plugins work here.

title: Lee Rogers
tagline: Applied AI That People Actually Adopt
description: >-
  Lee Rogers is a behavioral scientist (PhD) and research strategist in
  Philadelphia. He builds AI systems for associations and professional-services
  firms, and studies what makes skilled people trust and use them.
url: "https://leeloew.github.io"
baseurl: ""

author:
  name: Lee Rogers
  email: Leeland.Rogers@gmail.com
  location: Philadelphia, PA
  job_title: Research Strategist & Applied-AI Specialist
  # Add profile handles here to surface them in the footer and structured data.
  # linkedin: your-linkedin-slug
  # github: LeeLoew

# Navigation — order matters. `cta` renders as the highlighted button.
nav:
  - name: About
    url: /aboutme
  - name: Background
    url: /research
  - name: Case studies
    url: /work
  - name: Writing
    url: /insights
cta:
  name: Work With Me
  url: /work-with-me

# Future insight essays live in _posts/ and publish under /insights/<slug>/
permalink: /insights/:title/

# Case studies live in _work/ and publish under /work/<slug>/
collections:
  work:
    output: true
    permalink: /work/:name/

# Site-wide social-share image (per-page override: og_image in front matter)
og_image: /assets/img/og.png

timezone: America/New_York
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
feed:
  path: feed.xml

# Keep the password-gated area out of the sitemap (robots.txt disallows it).
defaults:
  - scope:
      path: "private"
    values:
      sitemap: false
  - scope:
      path: ""
      type: work
    values:
      layout: case-study

# Keep repo plumbing and private-page tooling out of the published site.
exclude:
  - README.md
  - CLAUDE.local.md
  - assets/img/og-source.svg
  - Gemfile
  - Gemfile.lock
  - vendor
  - private/README.md
  - private/encrypt.sh
  - private/_src
