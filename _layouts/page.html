---
layout: default
---
<section class="page-hero">
  <div class="shell">
    <p class="eyebrow">{{ page.kicker | default: "Lee Rogers" }}</p>
    <h1>{{ page.title }}</h1>
    {%- if page.subtitle %}
    <p class="page-subtitle">{{ page.subtitle }}</p>
    {%- endif %}
  </div>
</section>

<div class="page-body shell prose">
  {{ content }}
</div>
