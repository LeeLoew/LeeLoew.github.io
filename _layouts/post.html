---
layout: default
---
<section class="page-hero">
  <div class="shell">
    <p class="eyebrow">Insights</p>
    <h1>{{ page.title }}</h1>
    {%- if page.subtitle %}
    <p class="page-subtitle">{{ page.subtitle }}</p>
    {%- endif %}
    <p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time></p>
  </div>
</section>

<article class="page-body shell prose">
  {{ content }}
</article>

<div class="shell post-footer">
  <a class="btn btn-ghost" href="{{ '/insights' | relative_url }}">← All insights</a>
</div>
